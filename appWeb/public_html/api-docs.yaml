    # -------------------------------------------------------------------------
    # User & auth models
    # -------------------------------------------------------------------------

    User:
      type: object
      description: Public user profile
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john.doe
        display_name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [user, editor, admin, global_admin]
          example: user

    UserWithEmail:
      type: object
      description: User profile including email (returned after profile update)
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john.doe
        display_name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        role:
          type: string
          enum: [user, editor, admin, global_admin]

    AuthResponse:
      type: object
      description: Authentication response with token and user info
      properties:
        token:
          type: string
          description: 64-character hex bearer token (valid for 30 days)
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        user:
          $ref: "#/components/schemas/User"

    # -------------------------------------------------------------------------
    # Access & group models
    # -------------------------------------------------------------------------

    UserGroup:
      type: object
      description: A user group with version access flags
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Beta Testers
        accessAlpha:
          type: boolean
          description: Access to alpha builds
        accessBeta:
          type: boolean
          description: Access to beta builds
        accessRc:
          type: boolean
          description: Access to release candidate builds
        accessRtw:
          type: boolean
          description: Access to release-to-web builds

    # -------------------------------------------------------------------------
    # Admin models
    # -------------------------------------------------------------------------

    AdminUser:
      type: object
      description: User record visible to administrators
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john.doe
        email:
          type: string
          nullable: true
        display_name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [user, editor, admin, global_admin]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        group_name:
          type: string
          nullable: true
          description: Name of the user's primary group

    AdminGroup:
      type: object
      description: User group record for administration
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        accessAlpha:
          type: boolean
        accessBeta:
          type: boolean
        accessRc:
          type: boolean
        accessRtw:
          type: boolean

    ActivityLogEntry:
      type: object
      description: A single activity log entry
      properties:
        id:
          type: integer
        action:
          type: string
          description: Action type identifier
        entityType:
          type: string
          nullable: true
          description: Type of entity affected
        entityId:
          type: string
          nullable: true
          description: ID of the entity affected
        details:
          type: object
          nullable: true
          description: Additional structured details (JSON)
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        username:
          type: string
          nullable: true
          description: Username of the actor

    # -------------------------------------------------------------------------
    # Generic response models
    # -------------------------------------------------------------------------

    Error:
      type: object
      description: Error response
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
          example: Something went wrong.

    SuccessResponse:
      type: object
      description: Generic success response
      properties:
        ok:
          type: boolean
          example: true
