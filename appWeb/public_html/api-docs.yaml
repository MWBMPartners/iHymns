      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [terms] }
      responses:
        "200":
          description: HTML fragment
          content: { text/html: { schema: { type: string } } }

  /api.php?action=privacy:
    get:
      operationId: pagePrivacy
      tags: [Pages]
      summary: Rendered Privacy Policy page
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [privacy] }
      responses:
        "200":
          description: HTML fragment
          content: { text/html: { schema: { type: string } } }

  /api.php?action=settings:
    get:
      operationId: pageSettings
      tags: [Pages]
      summary: Rendered Settings modal HTML
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [settings] }
      responses:
        "200":
          description: HTML fragment
          content: { text/html: { schema: { type: string } } }

  /api.php?action=json:
    get:
      operationId: exportJson
      tags: [Pages]
      summary: Export one song as JSON
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [json] }
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full song JSON
          content:
            application/json:
              schema: { type: object }

  /api.php?action=xml:
    get:
      operationId: exportXml
      tags: [Pages]
      summary: Export one song as generic XML
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [xml] }
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Song as XML
          content:
            application/xml:
              schema: { type: string }

  /api.php?action=csv:
    get:
      operationId: exportCsv
