                      $ref: "#/components/schemas/AdminGroup"
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api.php?action=admin_activity_log:
    get:
      operationId: adminGetActivityLog
      tags: [Admin]
      summary: Get activity log
      description: |
        Retrieve the system activity log with optional filtering by action
        type or user. Requires admin or global_admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [admin_activity_log]
        - name: limit
          in: query
          required: false
          description: Number of entries to return
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          required: false
          description: Number of entries to skip (for pagination)
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: action_filter
          in: query
          required: false
          description: Filter by action type
          schema:
            type: string
        - name: user_id
          in: query
          required: false
          description: Filter by user ID
          schema:
            type: integer
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityLogEntry"
                  limit:
                    type: integer
                    example: 50
                  offset:
                    type: integer
                    example: 0
        "403":
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api.php?action=admin_song_requests:
    get:
      operationId: adminListSongRequests
      tags: [Admin]
      summary: List all song requests
      description: |
        Retrieve all community song requests with optional status filtering.
        Requires editor, admin, or global_admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [admin_song_requests]
        - name: status
          in: query
          required: false
          description: Filter by request status
          schema:
            type: string
            enum: [pending, reviewed, added, declined]
      responses:
        "200":
          description: Song requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminSongRequest"
        "403":
          description: Editor access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api.php?action=admin_song_request_update:
    post:
      operationId: adminUpdateSongRequest
      tags: [Admin]
      summary: Update a song request
      description: |
        Update the status and admin notes on a song request. Requires editor,
        admin, or global_admin role.
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [admin_song_request_update]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, status]
              properties:
                id:
                  type: integer
                  description: Song request ID
                  example: 42
                status:
                  type: string
                  description: New status
                  enum: [pending, reviewed, added, declined]
                  example: reviewed
                admin_notes:
                  type: string
                  description: Admin notes or response
                  example: This song will be added in the next update.
                resolved_song_id:
                  type: string
                  description: Song ID if the request has been fulfilled
                  example: CP-0651
      responses:
        "200":
          description: Request updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid ID or status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Editor access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api?action=admin_set_user_tier:
    post:
      operationId: adminSetUserTier
      tags: [Admin]
      summary: Set a user's content access tier (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [admin_set_user_tier]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, tier]
              properties:
                user_id: { type: integer }
                tier: { type: string, enum: [public, free, ccli, premium, pro] }
      responses:
        "200":
          description: Tier updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api?action=admin_set_user_ccli:
    post:
      operationId: adminSetUserCcli
      tags: [Admin]
      summary: Validate and set a user's CCLI number (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema:
            type: string
            enum: [admin_set_user_ccli]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: integer }
                ccli_number: { type: string, description: "Empty string to clear" }
      responses:
        "200":
          description: CCLI number set or cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ===========================================================================
  # OFFLINE / PWA  (bulk fetch endpoints for the service worker)
  # ===========================================================================

  /api.php?action=bulk_songs:
    get:
      operationId: bulkSongs
      tags: [Offline / PWA]
      summary: Rendered HTML for every song in a songbook
      description: |
        Returns a map of `songId` → pre-rendered song-page HTML for every
        song in the given songbook. Used by the service worker to pre-cache
        an entire songbook in a single request (~6 requests for the whole
        corpus vs. thousands).
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [bulk_songs] }
        - name: songbook
          in: query
          required: true
          description: Songbook abbreviation (e.g. `CP`, `MP`, `Misc`)
          schema: { type: string }
      responses:
        "200":
          description: Map of song IDs to rendered HTML
          content:
            application/json:
              schema:
                type: object
                properties:
                  songbook: { type: string, example: CP }
                  count:    { type: integer, example: 642 }
                  songs:
                    type: object
                    additionalProperties:
                      type: string
                      description: Rendered `<article>` HTML for the song page

  /api.php?action=bulk_audio:
    get:
      operationId: bulkAudio
      tags: [Offline / PWA]
      summary: Audio URL manifest for every song with audio (#401)
      description: |
        Returns `{songId, url}` for every song whose `HasAudio` flag is set.
        Used by the service worker to pre-cache audio into `iHymns-media-v1`
        when the user enables "Include audio in offline downloads" in
        Settings.
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [bulk_audio] }
        - name: songbook
          in: query
          required: false
          description: Restrict the manifest to one songbook abbreviation
          schema: { type: string, example: CP }
      responses:
        "200":
          description: Audio URL manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  songbook: { type: string, nullable: true, example: CP }
                  count:    { type: integer, example: 180 }
                  audio:
                    type: array
                    items:
                      type: object
                      properties:
                        songId: { type: string, example: CP-0202 }
                        url:    { type: string, example: /data/audio/CP/0202.mp3 }

  # ===========================================================================
  # DISCOVERY  (popular / tags / suggest / related)
  # ===========================================================================

  /api.php?action=popular_songs:
    get:
      operationId: popularSongs
      tags: [Discovery]
      summary: Most-viewed songs over the trailing window
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [popular_songs] }
        - name: days
          in: query
          required: false
          schema: { type: integer, default: 30, minimum: 1, maximum: 365 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 12, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: Ranked list of popular songs
          content:
            application/json:
              schema:
                type: object
                properties:
                  popular:
                    type: array
                    items:
                      $ref: "#/components/schemas/SongSummary"

  /api.php?action=tags:
    get:
      operationId: listTags
      tags: [Discovery]
      summary: List every curated song tag
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [tags] }
      responses:
        "200":
          description: Tag list with song counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      type: object
                      properties:
                        id:       { type: integer }
                        name:     { type: string, example: Easter }
                        slug:     { type: string, example: easter }
                        songCount: { type: integer }

  /api.php?action=songs_by_tag:
    get:
      operationId: songsByTag
      tags: [Discovery]
      summary: Songs tagged with a given slug
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [songs_by_tag] }
        - name: slug
          in: query
          required: true
          schema: { type: string, example: communion }
      responses:
        "200":
          description: Songs for the tag
          content:
            application/json:
              schema:
                type: object
                properties:
                  tag:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      slug: { type: string }
                  songs:
                    type: array
                    items: { $ref: "#/components/schemas/SongSummary" }

  /api.php?action=suggest:
    get:
      operationId: suggest
      tags: [Discovery]
      summary: Typeahead suggestions for the search box
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [suggest] }
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Suggestion list
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      type: object
                      properties:
                        label: { type: string }
                        type:  { type: string, enum: [song, writer, songbook, tag] }
                        id:    { type: string, nullable: true }

  /api.php?action=related_songs:
    get:
      operationId: relatedSongs
      tags: [Discovery]
      summary: Songs related to the given song
      description: Matches by shared tags, same writer, or same songbook vicinity.
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [related_songs] }
        - name: id
          in: query
          required: true
          description: Source song id (e.g. `CP-0202`)
          schema: { type: string }
      responses:
        "200":
          description: Related songs
          content:
            application/json:
              schema:
                type: object
                properties:
                  related:
                    type: array
                    items: { $ref: "#/components/schemas/SongSummary" }

  /api.php?action=song:
    get:
      operationId: getSong
      tags: [Songs]
      summary: Full song record (metadata + components + writers/composers)
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [song] }
        - name: id
          in: query
          required: true
          schema: { type: string, example: CP-0202 }
      responses:
        "200":
          description: Full song record
        "404":
          description: Song not found

  /api.php?action=song_view:
    post:
      operationId: logSongView
      tags: [Songs]
      summary: Log a song-view event
      description: |
        Fire-and-forget analytics ping. Writes one row to `tblSongHistory`
        so the dashboard's view counts + `popular_songs` can aggregate.
        Never blocks the response.
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [song_view] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [songId]
              properties:
                songId: { type: string, example: CP-0202 }
      responses:
        "200":
          description: Logged (or silently dropped when consent is denied)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ===========================================================================
  # PREFERENCES
  # ===========================================================================

  /api.php?action=user_preferences:
    get:
      operationId: getUserPreferences
      tags: [Preferences]
      summary: Fetch the caller's server-synced preferences
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [user_preferences] }
      responses:
        "200":
          description: Preference map
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: object
                    additionalProperties:
                      type: string
                    example:
                      theme: dark
                      fontSize: "18"
                      defaultSongbook: CP

  /api.php?action=user_preferences_sync:
    post:
      operationId: syncUserPreferences
      tags: [Preferences]
      summary: Last-write-wins sync of preferences across devices
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [user_preferences_sync] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preferences]
              properties:
                preferences:
                  type: object
                  additionalProperties: { type: string }
      responses:
        "200":
          description: Applied server-side; merged result returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: object
                    additionalProperties: { type: string }

  # ===========================================================================
  # SETLISTS — SCHEDULING (#398)
  # ===========================================================================

  /api.php?action=setlist_schedule_set:
    post:
      operationId: setlistScheduleSet
      tags: [Setlists — Scheduling]
      summary: Schedule a setlist for a date
      description: |
        Replaces any existing schedule for the (user, setlistId) pair with a
        new date + optional notes. Ownership is verified against
        `tblUserSetlists`.
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_schedule_set] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setlistId, date]
              properties:
                setlistId: { type: string, example: slist-abc123 }
                date:
                  type: string
                  format: date
                  example: "2026-05-03"
                notes:
                  type: string
                  description: Optional free-text notes
                  example: "Sunday 10am — Communion service"
      responses:
        "200":
          description: Scheduled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "400":
          description: Missing or malformed fields
        "401":
          description: Unauthorised
        "404":
          description: Setlist not found or not owned by caller

  /api.php?action=setlist_schedule_clear:
    post:
      operationId: setlistScheduleClear
      tags: [Setlists — Scheduling]
      summary: Remove the scheduled date for a setlist
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_schedule_clear] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setlistId]
              properties:
                setlistId: { type: string, example: slist-abc123 }
      responses:
        "200":
          description: Cleared (no-op if nothing was scheduled)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /api.php?action=setlist_schedule_current:
    get:
      operationId: setlistScheduleCurrent
      tags: [Setlists — Scheduling]
      summary: Fetch the current schedule for one setlist
      description: Used by the setlist detail view to pre-populate the date input.
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_schedule_current] }
        - name: setlistId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Schedule row or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    oneOf:
                      - type: "null"
                      - type: object
                        properties:
                          ScheduledDate: { type: string, format: date }
                          Notes:         { type: string }

  /api.php?action=setlist_schedule_upcoming:
    get:
      operationId: setlistScheduleUpcoming
      tags: [Setlists — Scheduling]
      summary: Next 25 scheduled setlists from today forward
      description: |
        Powers the "Up next" card on the setlist overview page. Only
        returns the caller's own scheduled setlists (not ones shared
        with them).
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_schedule_upcoming] }
      responses:
        "200":
          description: Upcoming schedule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  upcoming:
                    type: array
                    items:
                      type: object
                      properties:
                        SetlistId:     { type: string }
                        ScheduledDate: { type: string, format: date }
                        Notes:         { type: string }
                        name:          { type: string, nullable: true }

  # ===========================================================================
  # SETLISTS — COLLABORATION (#398)
  # ===========================================================================

  /api.php?action=setlist_collab_invite:
    post:
      operationId: setlistCollabInvite
      tags: [Setlists — Collaboration]
      summary: Invite a user by email to collaborate on a setlist
      description: |
        Owner-only. Resolves the invitee by email (must already have an
        iHymns account) and upserts a row in `tblSetlistCollaborators`.
        Re-inviting the same user updates their permission.
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_collab_invite] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setlistId, collaboratorEmail]
              properties:
                setlistId:          { type: string }
                collaboratorEmail:  { type: string, format: email }
                permission:
                  type: string
                  enum: [view, edit]
                  default: edit
      responses:
        "200":
          description: Invitation accepted / permission updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  collaborator:
                    type: object
                    properties:
                      id:         { type: integer }
                      username:   { type: string }
                      permission: { type: string, enum: [view, edit] }
        "400":
          description: Missing fields, invalid email, or self-invite
        "404":
          description: Setlist not owned by caller, or no user with that email

  /api.php?action=setlist_collab_list:
    get:
      operationId: setlistCollabList
      tags: [Setlists — Collaboration]
      summary: List collaborators on a setlist the caller owns
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_collab_list] }
        - name: setlistId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Collaborator list, newest invite first
          content:
            application/json:
              schema:
                type: object
                properties:
                  collaborators:
                    type: array
                    items:
                      type: object
                      properties:
                        id:         { type: integer }
                        username:   { type: string }
                        email:      { type: string, format: email }
                        permission: { type: string, enum: [view, edit] }
                        invitedAt:  { type: string, format: date-time }

  /api.php?action=setlist_collab_remove:
    post:
      operationId: setlistCollabRemove
      tags: [Setlists — Collaboration]
      summary: Revoke a collaborator's access to a setlist
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_collab_remove] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setlistId, collaboratorId]
              properties:
                setlistId:      { type: string }
                collaboratorId: { type: integer }
      responses:
        "200":
          description: Removed (reports how many rows were deleted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean }
                  removed: { type: integer, minimum: 0 }

  /api.php?action=setlist_collab_shared_with_me:
    get:
      operationId: setlistCollabSharedWithMe
      tags: [Setlists — Collaboration]
      summary: Setlists the caller has been invited to
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [setlist_collab_shared_with_me] }
      responses:
        "200":
          description: Shared-with-me list
          content:
            application/json:
              schema:
                type: object
                properties:
                  shared:
                    type: array
                    items:
                      type: object
                      properties:
                        ownerId:    { type: integer }
                        ownerName:  { type: string }
                        setlistId:  { type: string }
                        permission: { type: string, enum: [view, edit] }
                        name:       { type: string, nullable: true }

  # ===========================================================================
  # PUSH NOTIFICATIONS
  # ===========================================================================

  /api.php?action=push_subscribe:
    post:
      operationId: pushSubscribe
      tags: [Push]
      summary: Register a Web Push subscription for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [push_subscribe] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, keys]
              properties:
                endpoint: { type: string, format: uri }
                keys:
                  type: object
                  required: [p256dh, auth]
                  properties:
                    p256dh: { type: string }
                    auth:   { type: string }
      responses:
        "200":
          description: Subscription stored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /api.php?action=push_unsubscribe:
    post:
      operationId: pushUnsubscribe
      tags: [Push]
      summary: Remove a Web Push subscription
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [push_unsubscribe] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint]
              properties:
                endpoint: { type: string, format: uri }
      responses:
        "200":
          description: Removed (idempotent)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  # ===========================================================================
  # EDITOR API  (separate entry point — /manage/editor/api.php)
  # ===========================================================================

  /manage/editor/api.php?action=load:
    get:
      operationId: editorLoad
      tags: [Editor API]
      summary: Load every song + songbook + writer row the editor needs
      description: |
        Editor SPA hits this once on open. Returns the full in-memory
        model. Auth is the `/manage/` PHP session — not a Bearer token.
      responses:
        "200":
          description: Full editor payload
        "401":
          description: Not authenticated (redirect the user to /manage/login)
        "403":
          description: Authenticated but not an editor

  /manage/editor/api.php?action=save_song:
    post:
      operationId: editorSaveSong
      tags: [Editor API]
      summary: Transactional UPSERT of one song (#394)
      description: |
        Writes `tblSongs` + children in a transaction and records one row
        in `tblSongRevisions` with `PreviousData` / `NewData` snapshots.
        The editor calls this per modified song — much cheaper than the
        legacy full-corpus `save`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, title]
              properties:
                id:              { type: string, example: CP-0202 }
                title:           { type: string }
                number:
                  type: integer
                  nullable: true
                  description: Null for `Misc` songs or when empty (#392)
                songbook:        { type: string }
                songbookName:    { type: string }
                language:        { type: string, example: en }
                copyright:       { type: string }
                ccli:            { type: string }
                verified:            { type: boolean }
                lyricsPublicDomain:  { type: boolean }
                musicPublicDomain:   { type: boolean }
                hasAudio:            { type: boolean }
                hasSheetMusic:       { type: boolean }
                components:
                  type: array
                  items:
                    type: object
                    properties:
                      type:  { type: string, example: verse }
                      cNum:  { type: integer }
                      lines: { type: array, items: { type: string } }
      responses:
        "200":
          description: Saved; revision logged
        "400":
          description: Missing required id/title
        "500":
          description: Save failed; details in server log

  /manage/editor/api.php?action=bulk_tag:
    post:
      operationId: editorBulkTag
      tags: [Editor API]
      summary: Add and/or remove tags across a list of songs (#399)
      description: |
        Transactional. ADDs upsert `tblSongTags` (with slug) and
        INSERT-IGNORE into `tblSongTagMap`. REMOVEs resolve by tag name
        and delete matching mapping rows. Unknown tag names on remove
        are silently ignored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [songIds]
              properties:
                songIds:
                  type: array
                  items: { type: string, example: CP-0202 }
                add:
                  type: array
                  items: { type: string, example: Easter }
                remove:
                  type: array
                  items: { type: string, example: Funeral }
      responses:
        "200":
          description: Summary of what changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  songsAffected: { type: integer }
                  added:         { type: integer, description: Rows actually inserted }
                  removed:       { type: integer, description: Rows actually deleted }
        "400":
          description: No valid songIds or no tag changes supplied

  /manage/editor/api.php?action=list_revisions:
    get:
      operationId: editorListRevisions
      tags: [Editor API]
      summary: List revisions for one song (#400)
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [list_revisions] }
        - name: songId
          in: query
          required: true
          schema: { type: string, example: CP-0202 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Revision list, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  revisions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:           { type: integer }
                        action:       { type: string, enum: [create, edit, restore, delete] }
                        createdAt:    { type: string, format: date-time }
                        userId:       { type: integer, nullable: true }
                        username:     { type: string, nullable: true }
                        previousData: { type: object, nullable: true }
                        newData:      { type: object, nullable: true }

  /manage/editor/api.php?action=restore_revision:
    post:
      operationId: editorRestoreRevision
      tags: [Editor API]
      summary: Restore a song to the state BEFORE a given revision (#400)
      description: |
        Rewrites the core `tblSongs` row from the chosen revision's
        `PreviousData` and records a new revision with `Action='restore'`
        whose `PreviousData` captures the state just-overwritten.
        Transactional — rolls back on any failure.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [revisionId]
              properties:
                revisionId: { type: integer, example: 4712 }
      responses:
        "200":
          description: Restored; new revision row's id is returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:            { type: boolean }
                  songId:        { type: string }
                  newRevisionId: { type: integer }
        "404":
          description: Revision id not found
        "409":
          description: This revision has no prior state (it's the initial create)

