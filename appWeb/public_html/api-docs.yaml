      operationId: exportOpenSong
      tags: [Pages]
      summary: Export one song in OpenSong XML format
      description: See integration notes in `/manage/setup-database` on import compatibility.
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [opensong] }
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OpenSong XML
          content: { application/xml: { schema: { type: string } } }

  /api.php?action=videopsalm:
    get:
      operationId: exportVideoPsalm
      tags: [Pages]
      summary: Export one song in VideoPsalm JSON format
      parameters:
        - name: action
          in: query
          required: true
          schema: { type: string, enum: [videopsalm] }
        - name: id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: VideoPsalm JSON
          content: { application/json: { schema: { type: object } } }

# =============================================================================
# COMPONENTS
# =============================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        64-character hex token obtained from `auth_register` or `auth_login`.
        Tokens expire after 30 days.

  schemas:
    # -------------------------------------------------------------------------
    # Core domain models
    # -------------------------------------------------------------------------

    Song:
      type: object
      description: Complete song object with lyrics components
      properties:
        id:
          type: string
          description: "Unique song ID in BOOK-NUMBER format"
          example: CP-0202
        number:
          type: integer
          description: Song number within the songbook
          example: 202
        title:
          type: string
          description: Song title
          example: Amazing Grace
        songbook:
          type: string
          description: Songbook abbreviation
          example: CP
        songbookName:
          type: string
          description: Full songbook name
          example: Christian Praise
        language:
          type: string
          description: Language code
          example: en
        copyright:
          type: string
          nullable: true
          description: Copyright information
        ccli:
          type: string
          nullable: true
          description: CCLI license number
        verified:
          type: boolean
          description: Whether the song lyrics have been verified
        lyricsPublicDomain:
          type: boolean
          description: Whether the lyrics are in the public domain
        musicPublicDomain:
          type: boolean
          description: Whether the music is in the public domain
        hasAudio:
          type: boolean
          description: Whether an audio recording is available
        hasSheetMusic:
          type: boolean
          description: Whether sheet music is available
        writers:
          type: array
          items:
            type: string
          description: Lyricist / writer names
          example: ["John Newton"]
        composers:
          type: array
          items:
            type: string
          description: Composer / tune names
          example: ["Virginia Harmony"]
        components:
          type: array
          description: Ordered song components (verses, choruses, etc.)
          items:
            $ref: "#/components/schemas/SongComponent"

    SongComponent:
      type: object
      description: A single verse, chorus, or other song section
      properties:
        type:
          type: string
          description: "Component type (e.g., verse, chorus, bridge)"
          example: verse
        number:
          type: integer
          description: Component number (e.g., verse 1, verse 2)
          example: 1
        lines:
          type: array
          items:
            type: string
          description: Lines of text in this component
          example:
            - Amazing grace how sweet the sound
            - That saved a wretch like me
            - I once was lost but now am found
            - Was blind but now I see

    SongSummary:
      type: object
      description: Lightweight song summary for list views (no lyrics)
      properties:
        id:
          type: string
          example: CP-0202
        number:
          type: integer
          example: 202
        title:
          type: string
          example: Amazing Grace
        songbook:
          type: string
          example: CP
        songbookName:
          type: string
          example: Christian Praise
        writers:
          type: array
          items:
            type: string
          example: ["John Newton"]
        hasAudio:
          type: boolean
        hasSheetMusic:
          type: boolean

    Songbook:
      type: object
      description: A songbook / hymnal
      properties:
        id:
          type: string
          description: Songbook abbreviation
          example: CP
        name:
          type: string
          description: Full songbook name
          example: Christian Praise
        songCount:
          type: integer
          description: Number of songs in the songbook
          example: 650

    Stats:
      type: object
      description: Aggregate collection statistics
      properties:
        totalSongs:
          type: integer
          example: 4500
        totalSongbooks:
          type: integer
          example: 6
        songbooks:
          type: array
          items:
            $ref: "#/components/schemas/Songbook"

    # -------------------------------------------------------------------------
    # Language & translation models
    # -------------------------------------------------------------------------

    Language:
      type: object
      properties:
        code:
          type: string
          description: ISO language code
          example: en
        name:
          type: string
          description: Language name in English
          example: English
        nativeName:
          type: string
          description: Language name in the native language
          example: English
        textDirection:
          type: string
          description: Text direction
          enum: [ltr, rtl]
          example: ltr

    SongTranslation:
      type: object
      properties:
        songId:
          type: string
          description: Translated song ID
          example: FR-0202
        language:
          type: string
          description: Target language code
          example: fr
        languageName:
          type: string
          description: Target language name in English
          example: French
        languageNativeName:
          type: string
          description: Target language native name
          example: "Fran\u00E7ais"
        title:
          type: string
          description: Translated song title
          example: "Gr\u00E2ce infinie"
        number:
          type: integer
          description: Song number in the translated songbook
          example: 202
        translator:
          type: string
          nullable: true
          description: Translator name
        verified:
          type: boolean
          description: Whether the translation has been verified

    # -------------------------------------------------------------------------
    # Setlist models
    # -------------------------------------------------------------------------

    SharedSetlist:
      type: object
      description: A publicly shared setlist (owner UUID excluded)
      properties:
        id:
          type: string
          description: 8-character hex share ID
          example: "1a2b3c4d"
        name:
          type: string
          example: Sunday Morning Service
        songs:
          type: array
          items:
            type: string
          example: ["CP-0202", "MP-0042"]
        created:
          type: string
          format: date-time
          nullable: true
        updated:
          type: string
          format: date-time
          nullable: true
        arrangements:
          type: object
          description: Optional per-song arrangements (only present if set)
          additionalProperties:
            type: array
            items:
              type: integer

    UserSetlist:
      type: object
      description: A user-owned setlist stored server-side
      properties:
        id:
          type: string
          description: Client-generated setlist ID
        name:
          type: string
          example: Evening Worship
        songs:
          type: array
          items:
            $ref: "#/components/schemas/SetlistSongEntry"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SetlistSongEntry:
      type: object
      description: A song entry within a user setlist
      properties:
        id:
          type: string
          description: Song ID
          example: CP-0202
        title:
          type: string
          maxLength: 300
          example: Amazing Grace
        songbook:
          type: string
          maxLength: 20
          example: CP
        number:
          type: integer
          example: 202
        arrangement:
          type: array
          description: Optional custom component arrangement (array of component indices)
          items:
            type: integer
            minimum: 0
          example: [0, 1, 2, 1, 3]

    # -------------------------------------------------------------------------
    # Song request models
    # -------------------------------------------------------------------------

    SongRequest:
      type: object
      description: A user's own song request
      properties:
        id:
          type: integer
          example: 42
        title:
          type: string
          example: How Great Thou Art
        songbook:
          type: string
          nullable: true
        songNumber:
          type: string
          nullable: true
        language:
          type: string
          example: en
        details:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, reviewed, added, declined]
          example: pending
        resolvedSongId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true

    AdminSongRequest:
      type: object
      description: Song request with admin-visible fields
      properties:
        id:
          type: integer
        title:
          type: string
        songbook:
          type: string
          nullable: true
        songNumber:
          type: string
          nullable: true
        language:
          type: string
        details:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, reviewed, added, declined]
        adminNotes:
          type: string
          nullable: true
        resolvedSongId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        submittedBy:
          type: string
          nullable: true
          description: Username of the submitter (null if anonymous)

    # -------------------------------------------------------------------------
    # User & auth models
    # -------------------------------------------------------------------------

    User:
      type: object
      description: Public user profile
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john.doe
        display_name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [user, editor, admin, global_admin]
          example: user

    UserWithEmail:
      type: object
      description: User profile including email (returned after profile update)
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john.doe
        display_name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        role:
          type: string
          enum: [user, editor, admin, global_admin]

    AuthResponse:
      type: object
      description: Authentication response with token and user info
      properties:
        token:
          type: string
          description: 64-character hex bearer token (valid for 30 days)
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        user:
          $ref: "#/components/schemas/User"

    # -------------------------------------------------------------------------
    # Access & group models
    # -------------------------------------------------------------------------

    UserGroup:
      type: object
      description: A user group with version access flags
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Beta Testers
        accessAlpha:
          type: boolean
          description: Access to alpha builds
        accessBeta:
          type: boolean
          description: Access to beta builds
        accessRc:
          type: boolean
          description: Access to release candidate builds
        accessRtw:
          type: boolean
          description: Access to release-to-web builds

    # -------------------------------------------------------------------------
    # Admin models
    # -------------------------------------------------------------------------

    AdminUser:
      type: object
      description: User record visible to administrators
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: john.doe
        email:
          type: string
          nullable: true
        display_name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [user, editor, admin, global_admin]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        group_name:
          type: string
          nullable: true
          description: Name of the user's primary group

    AdminGroup:
      type: object
      description: User group record for administration
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        accessAlpha:
          type: boolean
        accessBeta:
          type: boolean
        accessRc:
          type: boolean
        accessRtw:
          type: boolean

    ActivityLogEntry:
      type: object
      description: A single activity log entry
      properties:
        id:
          type: integer
        action:
          type: string
          description: Action type identifier
        entityType:
          type: string
          nullable: true
          description: Type of entity affected
        entityId:
          type: string
          nullable: true
          description: ID of the entity affected
        details:
          type: object
          nullable: true
          description: Additional structured details (JSON)
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        username:
          type: string
          nullable: true
          description: Username of the actor

    # -------------------------------------------------------------------------
    # Generic response models
    # -------------------------------------------------------------------------

    Error:
      type: object
      description: Error response
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
          example: Something went wrong.

    SuccessResponse:
      type: object
      description: Generic success response
      properties:
        ok:
          type: boolean
          example: true
