<!--
  iHymns — Verified Badge Icon
  Copyright (c) 2026 iHymns. All rights reserved.

  A circular badge with a checkmark indicating that a song's lyrics
  have been verified as complete and accurate. Uses the app's muted
  teal accent colour (#0d9488) by default; inherits currentColor
  when used inline via CSS.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Circular background -->
  <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.15"/>
  <!-- Outer ring -->
  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Checkmark -->
  <path d="M7.5 12.5L10.5 15.5L16.5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
