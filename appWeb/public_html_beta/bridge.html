<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iHymns Storage Bridge</title>
</head>
<body>
<!--
    iHymns — Cross-Domain Storage Bridge (#133)
    Copyright (c) 2026 iHymns. All rights reserved.

    This page is embedded as a hidden iframe on all iHymns domains.
    It provides shared localStorage access via postMessage, allowing
    user settings and data to sync across ihymns.app, ihymns.net,
    beta.ihymns.app, etc.

    Deploy this file to the canonical sync domain (e.g. sync.ihymns.app).
-->
<script>
(function () {
    'use strict';

    /**
     * Allowed origin patterns for security.
     * Only accept messages from recognised iHymns domains.
     */
    const ALLOWED_ORIGINS = [
        /^https?:\/\/([\w-]+\.)?ihymns\.(app|net)(:\d+)?$/,
        /^https?:\/\/localhost(:\d+)?$/,
        /^https?:\/\/127\.0\.0\.1(:\d+)?$/,
    ];

    function isAllowedOrigin(origin) {
        return ALLOWED_ORIGINS.some(pattern => pattern.test(origin));
    }

    window.addEventListener('message', function (event) {
        if (!isAllowedOrigin(event.origin)) return;
        if (!event.data || event.data.ns !== 'ihymns-bridge') return;

        const { action, key, value, id } = event.data;
        let result = null;

        try {
            switch (action) {
                case 'get':
                    result = localStorage.getItem(key);
                    break;

                case 'set':
                    localStorage.setItem(key, value);
                    result = true;
                    break;

                case 'remove':
                    localStorage.removeItem(key);
                    result = true;
                    break;

                case 'keys':
                    result = Object.keys(localStorage).filter(k => k.startsWith('ihymns_'));
                    break;

                case 'getAll':
                    result = {};
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        if (k.startsWith('ihymns_')) {
                            result[k] = localStorage.getItem(k);
                        }
                    }
                    break;

                case 'clear':
                    /* Only clear ihymns_ prefixed keys */
                    const toRemove = [];
                    for (let i = 0; i < localStorage.length; i++) {
                        const k = localStorage.key(i);
                        if (k.startsWith('ihymns_')) toRemove.push(k);
                    }
                    toRemove.forEach(k => localStorage.removeItem(k));
                    result = true;
                    break;

                case 'ping':
                    result = 'pong';
                    break;

                default:
                    result = null;
            }
        } catch (e) {
            result = null;
        }

        /* Reply with the same id so the caller can match the response */
        event.source.postMessage({
            ns: 'ihymns-bridge',
            id: id,
            result: result,
        }, event.origin);
    });
})();
</script>
</body>
</html>
