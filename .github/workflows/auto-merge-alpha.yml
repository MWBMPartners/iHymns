#
# PURPOSE:
# Automatically enables GitHub's native "auto-merge" feature on any pull
# request whose base branch is `alpha`. Once enabled, GitHub will merge the
# PR as soon as all required status checks pass and any required reviews
# are satisfied. If checks fail, the PR stays open and is NOT merged.
#
# This workflow ONLY targets PRs whose base is `alpha`. PRs targeting any
# other branch (main, beta, etc.) are unaffected.
#
# REQUIREMENTS (one-time repo configuration — see notes at the bottom):
#   1. Repo Settings → General → "Allow auto-merge" must be enabled.
#   2. Branch protection rule on `alpha` SHOULD require status checks
#      (otherwise auto-merge will merge the PR immediately with no gate).
#
# MERGE METHOD:
# Uses squash merge by default. Change `--squash` below to `--merge` or
# `--rebase` if you prefer a different strategy.
# =============================================================================

name: Auto-Merge Alpha PRs

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - alpha

permissions:
  contents: write
  pull-requests: write
  # `gh workflow run` (used below to dispatch deploy.yml after merge)
  # requires the actions:write scope.
  actions: write

# Coalesce repeated synchronize events on the same PR — otherwise a quick
# series of pushes spawns parallel watchers that all race to dispatch the
# same deploy when the PR finally merges.
concurrency:
  group: auto-merge-alpha-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: Enable auto-merge on alpha PRs
    runs-on: ubuntu-latest
    # Skip drafts — auto-merge cannot be enabled on draft PRs.
    if: github.event.pull_request.draft == false
    steps:
      - name: Enable auto-merge (squash, delete branch on merge)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        # --delete-branch is explicit: gh's --auto path doesn't propagate
        # the repo-level delete_branch_on_merge setting through to the
        # GraphQL enablePullRequestAutoMerge mutation. Without this flag
        # every auto-merged PR's head branch sticks around after merge,
        # which is exactly the regression behind #750.
        #
        # Why this step is failure-tolerant: when a PR has no pending
        # required checks, `gh pr merge --auto` can exit non-zero
        # (there's no "pending" state to attach auto-merge to). The PR
        # still merges via GitHub's native flow once the checks queue
        # clears, but this step exiting non-zero used to skip the
        # wait-and-dispatch step below — which is what dispatches
        # deploy.yml. Result: #849 merged but its deploy never fired.
        # We log the gh output, classify the exit, and pass through.
        run: |
          set +e
          OUTPUT=$(gh pr merge --auto --squash --delete-branch "$PR_URL" 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            echo "auto-merge enabled."
            exit 0
          fi
          # Classify common benign failures so the wait-and-dispatch
          # step still runs.
          if echo "$OUTPUT" | grep -qiE 'already|clean status|queued'; then
            echo "::notice::gh pr merge --auto returned $STATUS but the PR appears mergeable / already-enabled — proceeding to wait-and-dispatch."
            exit 0
          fi
          # Real failure (auth / scope / repo setting): surface it but
          # still let the wait-and-dispatch step run, because the merge
          # might land via a parallel route (manual button, branch-rule
          # auto-merge) and we'd still want the deploy to fire.
          echo "::warning::gh pr merge --auto exited $STATUS — see output above. Continuing so the wait-and-dispatch step still runs."
          exit 0

      # ---------------------------------------------------------------------
      # Bridge GitHub's GITHUB_TOKEN anti-recursion rule (#551).
      #
      # The push to `alpha` produced by GitHub's auto-merge is attributed to
      # GITHUB_TOKEN, so deploy.yml's `on: push` trigger is suppressed and
      # no SFTP deploy fires. workflow_dispatch IS one of the two events a
      # workflow can trigger via GITHUB_TOKEN, so once the merge lands we
      # explicitly dispatch the deploy.
      #
      # Polling tradeoff: this step keeps a runner busy for the duration of
      # the merge gate (typically 1–5 min on alpha — only the lint job
      # gates). Capped at 60 min so a stuck check never burns runner time
      # indefinitely. A `CLOSED`-without-merge outcome exits cleanly with
      # no deploy dispatch.
      # ---------------------------------------------------------------------
      - name: Wait for merge and dispatch deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          for i in $(seq 1 120); do
              STATE=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q .state)
              case "$STATE" in
                  MERGED)
                      echo "PR #$PR_NUMBER merged — dispatching deploy.yml on alpha."
                      gh workflow run deploy.yml --repo "$REPO" --ref alpha
                      exit 0
                      ;;
                  CLOSED)
                      echo "PR #$PR_NUMBER closed without merging — skipping deploy."
                      exit 0
                      ;;
              esac
              echo "PR #$PR_NUMBER state=$STATE (poll $i/120) — sleeping 30 s"
              sleep 30
          done
          echo "::error::Timed out waiting for PR #$PR_NUMBER to reach a terminal state."
          exit 1
