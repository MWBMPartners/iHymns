# iHymns — Android App Build & Distribution Workflow
#
# Copyright © 2026 MWBM Partners Ltd. All rights reserved.
#
# PURPOSE:
# Automates building, testing, and distributing the iHymns Android app
# for Google Play Store, Amazon Appstore (Fire OS), and direct APK.
#
# TRIGGERS:
# - Push to beta: Build debug + release APK/AAB
# - Push to main: Build signed release AAB for Play Store
# - Push tags v*: Build all distribution formats
# - Manual dispatch: Build any target
#
# SUPPORTED PLATFORMS:
# - Standard Android (phones, tablets) API 26+
# - Amazon Fire OS (tablets, Fire TV, Fire TV Stick)
# - Android TV
# - ChromeOS (via Android app support)
# ============================================================================

name: Android Build & Distribution

on:
  push:
    branches: [beta, main]
    paths:
      - 'appAndroid/**'
      - '.github/workflows/build-android.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - all

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================================================
  # BUILD & TEST
  # ========================================================================
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ------------------------------------------------------------------
      # Checkout the repository
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Set up Java 21 (required for Android Gradle Plugin 8.x)
      # ------------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ------------------------------------------------------------------
      # Cache Gradle dependencies for faster builds
      # ------------------------------------------------------------------
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('appAndroid/**/*.gradle.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      # ------------------------------------------------------------------
      # Decode the keystore for signing (release builds only)
      # The keystore is stored as a base64-encoded GitHub secret.
      # ------------------------------------------------------------------
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        working-directory: appAndroid
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore configured — skipping signing"
          fi

      # ------------------------------------------------------------------
      # Run unit tests
      # ------------------------------------------------------------------
      - name: Run unit tests
        working-directory: appAndroid
        run: ./gradlew testDebugUnitTest --no-daemon

      # ------------------------------------------------------------------
      # Build Debug APK (for testing)
      # ------------------------------------------------------------------
      - name: Build Debug APK
        working-directory: appAndroid
        run: ./gradlew assembleDebug --no-daemon

      # ------------------------------------------------------------------
      # Build Release AAB (Android App Bundle for Play Store)
      # Only on main branch or tags
      # ------------------------------------------------------------------
      - name: Build Release AAB
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: appAndroid
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=release-keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ------------------------------------------------------------------
      # Build Release APK (for direct distribution + Amazon Appstore)
      # Only on main branch or tags
      # ------------------------------------------------------------------
      - name: Build Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: appAndroid
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=release-keystore.jks \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      # ------------------------------------------------------------------
      # Upload Debug APK artifact
      # ------------------------------------------------------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: appAndroid/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      # ------------------------------------------------------------------
      # Upload Release AAB artifact (Play Store)
      # ------------------------------------------------------------------
      - name: Upload Release AAB
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: appAndroid/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ------------------------------------------------------------------
      # Upload Release APK artifact (direct distribution + Amazon)
      # ------------------------------------------------------------------
      - name: Upload Release APK
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: appAndroid/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ------------------------------------------------------------------
      # Clean up keystore (security: don't leave credentials on runner)
      # ------------------------------------------------------------------
      - name: Clean up keystore
        if: always()
        working-directory: appAndroid
        run: rm -f app/release-keystore.jks

  # ========================================================================
  # PUBLISH TO GOOGLE PLAY (on main branch only)
  # ========================================================================
  publish-play:
    name: Publish to Google Play
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.PLAY_STORE_ENABLED == 'true'

    steps:
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: android-release-aab
          path: ./release

      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ltd.mwbmpartners.ihymns
          releaseFiles: ./release/*.aab
          track: internal
          status: completed
