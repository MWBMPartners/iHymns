#
# PURPOSE:
# Automatically generates changelog entries from commit messages when code
# is pushed to `main` or `beta`. Entries are prepended to CHANGELOG.md
# in the format:
#
#   ## [version] - YYYY-MM-DD
#   - commit message 1
#   - commit message 2
#
# Optionally uploads the updated changelog to the server via SFTP.
# =============================================================================

name: Changelog

on:
  push:
    branches:
      - main
      - beta

# Cancel any in-progress changelog generation on the same branch
concurrency:
  group: changelog-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest

    # Skip if the triggering commit was a CI automation commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository with full history for tag resolution
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Step 2: Read the current application version from infoAppVer.php
      # This is used as the heading for the changelog entry
      # -----------------------------------------------------------------------
      - name: Read current version
        id: version
        run: |
          # Determine which version file to read based on branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            VERSION_FILE="appWeb/public_html/includes/infoAppVer.php"
            # Fall back to beta if production file doesn't exist yet
            if [ ! -f "$VERSION_FILE" ]; then
              VERSION_FILE="appWeb/public_html_beta/includes/infoAppVer.php"
            fi
          else
            VERSION_FILE="appWeb/public_html_beta/includes/infoAppVer.php"
          fi

          VERSION=$(grep -oP "\\\$app\['Version'\]\['Number'\]\s*=\s*'\K[^']+" "$VERSION_FILE" || echo "Unreleased")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # -----------------------------------------------------------------------
      # Step 3: Gather commit messages since the last tag
      # If no tags exist, uses all commits on the branch
      # Filters out CI automation commits ([skip ci], chore: bump, etc.)
      # -----------------------------------------------------------------------
      - name: Gather commit messages
        id: commits
        run: |
          # Find the most recent tag on this branch
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "Gathering commits since tag: $LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
          else
            echo "No previous tags found. Using all commits."
            RANGE="HEAD"
          fi

          # Collect commit messages, filtering out automated commits
          MESSAGES=$(git log "$RANGE" --pretty=format:"- %s" \
            | grep -v '\[skip ci\]' \
            | grep -v '^- chore: bump version' \
            | grep -v '^- chore: sync beta to production' \
            | grep -v '^- chore: update changelog' \
            || true)

          if [ -z "$MESSAGES" ]; then
            echo "No meaningful commits found since last tag."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # Write messages to a temp file (multi-line output)
            echo "$MESSAGES" > /tmp/changelog_messages.txt
            echo "Commits to include:"
            echo "$MESSAGES"
          fi

      # -----------------------------------------------------------------------
      # Step 4: Generate the changelog entry and prepend to CHANGELOG.md
      # Creates the file if it doesn't exist
      # -----------------------------------------------------------------------
      - name: Update CHANGELOG.md
        if: steps.commits.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          CHANGELOG_FILE="CHANGELOG.md"

          # Build the new entry
          ENTRY="## [${VERSION}] - ${DATE}"
          ENTRY="${ENTRY}
          $(cat /tmp/changelog_messages.txt)"
          ENTRY="${ENTRY}
          "

          if [ -f "$CHANGELOG_FILE" ]; then
            # Check if this version already has an entry; if so, replace it
            if grep -q "## \[${VERSION}\]" "$CHANGELOG_FILE"; then
              echo "Updating existing entry for version ${VERSION}"
              # Remove the old entry for this version (up to the next ## heading or EOF)
              python3 -c "
          import re, sys
          with open('$CHANGELOG_FILE', 'r') as f:
              content = f.read()
          # Pattern: from this version heading to the next version heading (or end)
          pattern = r'## \[${VERSION}\] - \d{4}-\d{2}-\d{2}\n.*?(?=\n## \[|$)'
          cleaned = re.sub(pattern, '', content, flags=re.DOTALL).strip()
          print(cleaned)
          " > /tmp/changelog_cleaned.txt

              # Prepend the new entry
              echo "$ENTRY" > /tmp/changelog_new.txt
              echo "" >> /tmp/changelog_new.txt
              cat /tmp/changelog_cleaned.txt >> /tmp/changelog_new.txt
              mv /tmp/changelog_new.txt "$CHANGELOG_FILE"
            else
              echo "Prepending new entry for version ${VERSION}"
              # Check if file starts with a top-level heading (# Changelog)
              if head -1 "$CHANGELOG_FILE" | grep -q '^# '; then
                # Keep the title, insert entry after it
                HEAD_LINE=$(head -1 "$CHANGELOG_FILE")
                TAIL_CONTENT=$(tail -n +2 "$CHANGELOG_FILE")
                echo "$HEAD_LINE" > "$CHANGELOG_FILE"
                echo "" >> "$CHANGELOG_FILE"
                echo "$ENTRY" >> "$CHANGELOG_FILE"
                echo "$TAIL_CONTENT" >> "$CHANGELOG_FILE"
              else
                # No title — just prepend
                echo "$ENTRY" | cat - "$CHANGELOG_FILE" > /tmp/changelog_merged.txt
                mv /tmp/changelog_merged.txt "$CHANGELOG_FILE"
              fi
            fi
          else
            # Create a new CHANGELOG.md
            echo "# Changelog" > "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            echo "$ENTRY" >> "$CHANGELOG_FILE"
          fi

          echo "Changelog updated."
          cat "$CHANGELOG_FILE" | head -30

      # -----------------------------------------------------------------------
      # Step 5: Commit the changelog update
      # -----------------------------------------------------------------------
      - name: Commit changelog
        if: steps.commits.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "chore: update changelog for ${{ steps.version.outputs.version }} [skip ci]"
            git push
          fi

      # -----------------------------------------------------------------------
      # Step 6: (Optional) Upload changelog to the server via SFTP
      # Only runs if SFTP_ENABLED is 'true'
      # -----------------------------------------------------------------------
      - name: Upload changelog via SFTP
        if: >-
          steps.commits.outputs.has_changes == 'true'
          && vars.SFTP_ENABLED == 'true'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_BETA_PATH: ${{ secrets.SFTP_BETA_PATH }}
          SFTP_LIVE_PATH: ${{ secrets.SFTP_LIVE_PATH }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp

          # Determine target path based on branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_PATH="$SFTP_LIVE_PATH"
          else
            TARGET_PATH="$SFTP_BETA_PATH"
          fi

          # Build lftp authentication
          LFTP_AUTH=""
          if [ -n "$SFTP_KEY" ]; then
            mkdir -p ~/.ssh && chmod 700 ~/.ssh
            echo "$SFTP_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            LFTP_AUTH="set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key';"
          elif [ -n "$SFTP_PASSWORD" ]; then
            LFTP_AUTH="set ftp:password '$SFTP_PASSWORD';"
          else
            echo "::warning::No SFTP credentials. Skipping changelog upload."
            exit 0
          fi

          echo "Uploading CHANGELOG.md to $TARGET_PATH"

          lftp -c "
            $LFTP_AUTH
            set ssl:verify-certificate no;
            open sftp://$SFTP_USER@$SFTP_HOST;
            put -O $TARGET_PATH CHANGELOG.md;
            quit;
          "

          echo "Changelog uploaded."
          rm -f ~/.ssh/deploy_key
