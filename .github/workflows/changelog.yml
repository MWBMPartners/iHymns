# This software is proprietary.
#
# PURPOSE:
# Automatically generates changelog entries from commit messages when code
# is pushed to main or beta. Generates BOTH a root CHANGELOG.md AND
# per-platform changelogs:
#
#   CHANGELOG.md                    — All changes (root)
#   appWeb/CHANGELOG.md             — Web/PWA changes only
#   appApple/CHANGELOG.md           — Apple app changes only
#   appAndroid/CHANGELOG.md         — Android app changes only
#
# Each platform changelog only includes commits that touched files in
# that platform's directory. The root changelog includes everything.
#
# Optionally uploads changelogs to the server via SFTP.
# =============================================================================

name: Changelog

on:
  push:
    branches:
      - main
      - beta
    paths:
      - 'appWeb/**'
      - 'appApple/**'
      - 'appAndroid/**'
      - 'tools/**'
      - 'data/**'

# Cancel any in-progress changelog generation on the same branch
concurrency:
  group: changelog-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelogs
    runs-on: ubuntu-latest

    # Skip if the triggering commit was a CI automation commit
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository with full history for tag resolution
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Step 2: Read the current application version from infoAppVer.php
      # -----------------------------------------------------------------------
      - name: Read current version
        id: version
        run: |
          VERSION_FILE="appWeb/public_html/includes/infoAppVer.php"

          # Extract version number from the PHP file
          VERSION=$(grep -oP '\["Version"\]\["Number"\]\s*=\s*"\K[^"]+' "$VERSION_FILE" 2>/dev/null || echo "Unreleased")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      # -----------------------------------------------------------------------
      # Step 3: Determine commit range (since last tag or all commits)
      # -----------------------------------------------------------------------
      - name: Determine commit range
        id: range
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "range=${LAST_TAG}..HEAD" >> "$GITHUB_OUTPUT"
            echo "Commits since tag: $LAST_TAG"
          else
            echo "range=HEAD" >> "$GITHUB_OUTPUT"
            echo "No previous tags — using all commits"
          fi

      # -----------------------------------------------------------------------
      # Step 4: Generate per-platform changelogs + root changelog
      # For each platform, filter commits to only those touching that dir.
      # -----------------------------------------------------------------------
      - name: Generate changelogs
        id: generate
        env:
          CL_VERSION: ${{ steps.version.outputs.version }}
          CL_RANGE: ${{ steps.range.outputs.range }}
        shell: bash
        run: |
          DATE=$(date +%Y-%m-%d)
          HEADER="## [${CL_VERSION}] — ${DATE}"
          FILTER_OUT='(\[skip ci\]|^chore: bump version|^chore: sync|^chore: update changelog|^build: auto-sync)'
          HAS_CHANGES="false"

          # Write the Python helper script to a temp file (avoids YAML quoting issues)
          cat > /tmp/cl_clean.py << 'PYEOF'
          import re, sys
          version = sys.argv[1]
          filepath = sys.argv[2]
          with open(filepath, 'r') as f:
              content = f.read()
          pattern = r'## \[' + re.escape(version) + r'\] — \d{4}-\d{2}-\d{2}\n.*?(?=\n## \[|\Z)'
          cleaned = re.sub(pattern, '', content, flags=re.DOTALL).strip()
          print(cleaned)
          PYEOF

          # Function to generate a changelog for a given set of path filters
          generate_cl() {
            local CL_FILE="$1"
            local CL_NAME="$2"
            shift 2

            local MSGS=""
            for pf in "$@"; do
              local C=$(git log "${CL_RANGE}" --pretty=format:"%s" -- "$pf" 2>/dev/null | grep -vE "$FILTER_OUT" || true)
              if [ -n "$C" ]; then
                MSGS="${MSGS}${C}"$'\n'
              fi
            done

            MSGS=$(echo "$MSGS" | sort -u | sed '/^$/d' | sed 's/^/- /')
            if [ -z "$MSGS" ]; then
              echo "  No changes for ${CL_NAME}"
              return
            fi

            echo "  ${CL_NAME}: $(echo "$MSGS" | wc -l | tr -d ' ') entries"
            HAS_CHANGES="true"

            local ENTRY="${HEADER}"$'\n'"${MSGS}"$'\n'

            if [ -f "$CL_FILE" ]; then
              if grep -q "## \[${CL_VERSION}\]" "$CL_FILE"; then
                python3 /tmp/cl_clean.py "${CL_VERSION}" "${CL_FILE}" > /tmp/cl_cleaned.txt
                printf '%s\n\n' "$ENTRY" > /tmp/cl_new.txt
                cat /tmp/cl_cleaned.txt >> /tmp/cl_new.txt
                mv /tmp/cl_new.txt "$CL_FILE"
              elif head -1 "$CL_FILE" | grep -q '^# '; then
                local HL
                HL=$(head -1 "$CL_FILE")
                local TL
                TL=$(tail -n +2 "$CL_FILE")
                printf '%s\n\n%s\n%s\n' "$HL" "$ENTRY" "$TL" > "$CL_FILE"
              else
                printf '%s\n' "$ENTRY" | cat - "$CL_FILE" > /tmp/cl_m.txt
                mv /tmp/cl_m.txt "$CL_FILE"
              fi
            else
              printf '# %s — Changelog\n\n%s\n' "$CL_NAME" "$ENTRY" > "$CL_FILE"
            fi
          }

          echo "Generating changelogs..."
          generate_cl "CHANGELOG.md" "iHymns" "appWeb/" "appApple/" "appAndroid/" "tools/" "data/" "tests/"
          generate_cl "appWeb/CHANGELOG.md" "iHymns Web/PWA" "appWeb/"
          generate_cl "appApple/CHANGELOG.md" "iHymns Apple" "appApple/"
          generate_cl "appAndroid/CHANGELOG.md" "iHymns Android" "appAndroid/"

          echo "has_changes=${HAS_CHANGES}" >> "$GITHUB_OUTPUT"
          echo "Done."

      # -----------------------------------------------------------------------
      # Step 5: Commit all changelog updates
      # -----------------------------------------------------------------------
      - name: Commit changelogs
        if: steps.generate.outputs.has_changes == 'true'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all changelog files
          git add CHANGELOG.md appWeb/CHANGELOG.md appApple/CHANGELOG.md appAndroid/CHANGELOG.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
            exit 0
          fi

          git commit -m "chore: update changelogs for ${{ steps.version.outputs.version }} [skip ci]"

          # Retry on non-fast-forward rejection — the version-bump workflow runs
          # in parallel and may push to the same branch first.
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing on origin/${BRANCH} and retrying"
            git fetch origin "${BRANCH}"
            git rebase "origin/${BRANCH}"
            sleep $((attempt * 2))
          done

          echo "::error::Failed to push changelog after 5 attempts"
          exit 1

      # -----------------------------------------------------------------------
      # Step 6: (Optional) Resolve SFTP target + auth method
      # Only runs if SFTP_ENABLED is 'true'
      # -----------------------------------------------------------------------
      - name: Resolve SFTP upload settings
        if: >-
          steps.generate.outputs.has_changes == 'true'
          && vars.SFTP_ENABLED == 'true'
        id: sftp
        env:
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_BETA_PATH: ${{ secrets.SFTP_BETA_PATH }}
          SFTP_LIVE_PATH: ${{ secrets.SFTP_LIVE_PATH }}
          RAW_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          # Target path based on branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "target=$SFTP_LIVE_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "target=$SFTP_BETA_PATH" >> "$GITHUB_OUTPUT"
          fi

          # Resolve port (default 22 if missing/non-numeric)
          TRIMMED_PORT=$(echo "$RAW_PORT" | tr -d '[:space:]')
          if [[ "$TRIMMED_PORT" =~ ^[0-9]+$ ]] && [ "$TRIMMED_PORT" -ge 1 ] && [ "$TRIMMED_PORT" -le 65535 ]; then
            echo "port=$TRIMMED_PORT" >> "$GITHUB_OUTPUT"
          else
            echo "port=22" >> "$GITHUB_OUTPUT"
          fi

          # Auth method: prefer SSH key, fall back to password
          if [ -n "$SFTP_KEY" ]; then
            echo "auth=key" >> "$GITHUB_OUTPUT"
          elif [ -n "$SFTP_PASSWORD" ]; then
            echo "auth=password" >> "$GITHUB_OUTPUT"
          else
            echo "auth=none" >> "$GITHUB_OUTPUT"
            echo "::warning::No SFTP credentials configured — changelog upload will be skipped."
          fi

      - name: Install lftp
        if: >-
          steps.generate.outputs.has_changes == 'true'
          && vars.SFTP_ENABLED == 'true'
          && steps.sftp.outputs.auth != 'none'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Upload changelog via SFTP (SSH key)
        if: >-
          steps.generate.outputs.has_changes == 'true'
          && vars.SFTP_ENABLED == 'true'
          && steps.sftp.outputs.auth == 'key'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          SFTP_PORT: ${{ steps.sftp.outputs.port }}
          TARGET_PATH: ${{ steps.sftp.outputs.target }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SFTP_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > /tmp/lftp_changelog.txt <<LFTP_EOF
          set sftp:connect-program "ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/deploy_key -p ${SFTP_PORT}"
          set ssl:verify-certificate no
          open sftp://${SFTP_USER}@${SFTP_HOST}:${SFTP_PORT}
          put -O ${TARGET_PATH} appWeb/CHANGELOG.md
          bye
          LFTP_EOF
          lftp -f /tmp/lftp_changelog.txt
          rm -f ~/.ssh/deploy_key
          echo "Web changelog uploaded to ${TARGET_PATH}"

      - name: Upload changelog via SFTP (password)
        if: >-
          steps.generate.outputs.has_changes == 'true'
          && vars.SFTP_ENABLED == 'true'
          && steps.sftp.outputs.auth == 'password'
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ steps.sftp.outputs.port }}
          TARGET_PATH: ${{ steps.sftp.outputs.target }}
        run: |
          lftp -u "${SFTP_USER},${SFTP_PASS}" \
            -e "set sftp:auto-confirm yes; set ssl:verify-certificate no; \
                put -O ${TARGET_PATH} appWeb/CHANGELOG.md; bye" \
            "sftp://${SFTP_HOST}:${SFTP_PORT}"
          echo "Web changelog uploaded to ${TARGET_PATH}"
