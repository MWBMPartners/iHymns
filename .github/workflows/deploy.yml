# =============================================================================
# iHymns — Deploy via SFTP
#
# Copyright © 2026 MWBM Partners Ltd. All rights reserved.
# This software is proprietary.
#
# PURPOSE:
# Deploys the iHymns web PWA via SFTP, modelled on the phpWhoIs/DomainCheckr
# deployment pipeline.
#
# BRANCH → DIRECTORY → SERVER PATH:
#   main   → appWeb/public_html/      → SFTP_LIVE_PATH  (production)
#   beta   → appWeb/public_html_beta/ → SFTP_BETA_PATH  (beta)
#   alpha  → appWeb/public_html_dev/  → SFTP_DEV_PATH   (alpha/dev)
#
# FLOW:
#   1. On main push: sync public_html_beta/ → public_html/, then deploy
#   2. On beta push: deploy public_html_beta/ directly
#   3. On alpha push: deploy public_html_dev/ directly
#   4. Minify JS/CSS/HTML before upload
#   5. Inject build metadata into infoAppVer.php
#   6. Sync manifest.json from infoAppVer.php
#   7. Upload via lftp (SSH key or password auth)
#
# SECRETS REQUIRED:
#   SFTP_HOST, SFTP_PORT, SFTP_USER, SFTP_KEY (or SFTP_PASSWORD)
#   SFTP_LIVE_PATH, SFTP_BETA_PATH, SFTP_DEV_PATH
#
# VARIABLES:
#   vars.SFTP_ENABLED — set to 'true' to enable deployment (kill switch)
#
# SPECIAL COMMIT FLAGS:
#   [deploy all]  — force full deploy regardless of change detection
#   [skip sync]   — skip beta→production rsync on main branch
#   [skip ci]     — skip this workflow entirely
# =============================================================================

name: Deploy via SFTP

on:
  push:
    branches:
      - main
      - beta
      - alpha
    paths:
      - 'appWeb/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===========================================================================
  # JOB 1: Sync beta files to production directory on main branch pushes
  # This ensures public_html/ always mirrors public_html_beta/ for production
  # ===========================================================================
  sync-beta-to-production:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' && !contains(github.event.head_commit.message, '[skip sync]')

    steps:
      # -- Checkout the full repository --
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -- Rsync public_html_beta/ → public_html/ --
      # Excludes documentation and OS files that shouldn't be deployed
      - name: Sync public_html_beta → public_html
        id: sync
        run: |
          rsync -a --delete \
            --exclude='.DS_Store' \
            --exclude='.gitkeep' \
            --exclude='CHANGELOG.md' \
            --exclude='README.md' \
            --exclude='DEV_NOTES.md' \
            appWeb/public_html_beta/ appWeb/public_html/

          # Stage all files (including new/untracked) so git can detect changes
          git add appWeb/public_html/

          # Check if the staging area has any changes vs HEAD
          if git diff --cached --quiet appWeb/public_html/; then
            echo "synced=false" >> $GITHUB_OUTPUT
            echo "Production files already in sync"
            # Unstage since nothing changed
            git reset HEAD appWeb/public_html/ > /dev/null 2>&1 || true
          else
            echo "synced=true" >> $GITHUB_OUTPUT
            echo "Files synced — changes detected:"
            git diff --cached --stat appWeb/public_html/
          fi

      # -- Commit the synced files back to main --
      - name: Commit synced files
        if: steps.sync.outputs.synced == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appWeb/public_html/
          git commit -m "build: auto-sync public_html from public_html_beta [skip sync]"
          git push origin main

  # ===========================================================================
  # JOB 2: Deploy to server via SFTP
  # Runs after sync (if applicable), deploys the appropriate directory
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [sync-beta-to-production]
    # Always run (even if sync was skipped), but only if SFTP is enabled
    if: always() && vars.SFTP_ENABLED == 'true'

    steps:
      # -- Checkout code (latest, including any sync commits) --
      - name: Checkout code (latest, including any sync commits)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      # -- Pull latest if main (in case sync job pushed new commits) --
      - name: Pull latest (in case sync job pushed new commits)
        if: github.ref_name == 'main'
        run: git pull origin main

      # -- Determine which directory to deploy based on branch --
      - name: Determine deployment target
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "remote_path=${{ secrets.SFTP_LIVE_PATH }}" >> $GITHUB_OUTPUT
            echo "source_dir=appWeb/public_html/" >> $GITHUB_OUTPUT
            echo "channel=live" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "beta" ]]; then
            echo "remote_path=${{ secrets.SFTP_BETA_PATH }}" >> $GITHUB_OUTPUT
            echo "source_dir=appWeb/public_html_beta/" >> $GITHUB_OUTPUT
            echo "channel=beta" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "alpha" ]]; then
            echo "remote_path=${{ secrets.SFTP_DEV_PATH }}" >> $GITHUB_OUTPUT
            echo "source_dir=appWeb/public_html_dev/" >> $GITHUB_OUTPUT
            echo "channel=alpha" >> $GITHUB_OUTPUT
          fi

      # -- Check if deployable files changed in the last 5 commits --
      - name: Get changed files
        id: changes
        run: |
          SOURCE_DIR="${{ steps.target.outputs.source_dir }}"
          EXCLUDES="CHANGELOG.md|README.md|DEV_NOTES.md|\.DS_Store|\.gitkeep|\.gitignore"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")

          # Force full deploy if commit message contains [deploy all]
          if echo "$COMMIT_MSG" | grep -q "\[deploy all\]"; then
            echo "Full deploy requested via [deploy all]"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "full_deploy=true" >> $GITHUB_OUTPUT
          else
            # Check last 5 commits for changes in the source directory
            CHANGED=$(git diff --name-only HEAD~5 HEAD -- "$SOURCE_DIR" 2>/dev/null \
              | grep -vE "$EXCLUDES" | sort -u || true)

            if [[ -z "$CHANGED" ]]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "full_deploy=false" >> $GITHUB_OUTPUT
              echo "No deployable files changed in $SOURCE_DIR"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "full_deploy=false" >> $GITHUB_OUTPUT
              echo "Changed files:"
              echo "$CHANGED"
            fi
          fi

      # -- Install minification tools globally via npm --
      - name: Install minification tools
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          npm install -g terser clean-css-cli html-minifier-terser

      # -- Minify JS, CSS, HTML, XML before upload --
      - name: Minify files before upload
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          SOURCE_DIR="${{ steps.target.outputs.source_dir }}"

          # Minify JavaScript files
          find "$SOURCE_DIR" -name "*.js" -type f 2>/dev/null | while read -r file; do
            echo "Minifying JS: $file"
            terser "$file" --compress --mangle --output "$file" || echo "  Warning: failed to minify $file"
          done

          # Minify CSS files
          find "$SOURCE_DIR" -name "*.css" -type f 2>/dev/null | while read -r file; do
            echo "Minifying CSS: $file"
            cleancss -o "$file" "$file" || echo "  Warning: failed to minify $file"
          done

          # Minify HTML files
          find "$SOURCE_DIR" \( -name "*.html" -o -name "*.htm" \) -type f 2>/dev/null | while read -r file; do
            echo "Minifying HTML: $file"
            html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o "$file" "$file" || echo "  Warning: failed to minify $file"
          done

          # Minify XML files (strip whitespace between tags)
          find "$SOURCE_DIR" -name "*.xml" -type f 2>/dev/null | while read -r file; do
            echo "Minifying XML: $file"
            sed -i 's/>[[:space:]]*</></g' "$file" || echo "  Warning: failed to minify $file"
          done

      # -- For production: clear the Development Status to NULL --
      - name: Set production dev status to NULL
        if: steps.changes.outputs.has_changes == 'true' && github.ref_name == 'main'
        run: |
          VERFILE="${{ steps.target.outputs.source_dir }}includes/infoAppVer.php"
          if [[ -f "$VERFILE" ]]; then
            sed -i 's/\["Development"\]\["Status"\] = ".*"/["Development"]["Status"] = NULL/' "$VERFILE"
            echo "Set Development Status to NULL in $VERFILE"
          fi

      # -- Inject git commit info into infoAppVer.php --
      - name: Inject build info into infoAppVer.php
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          SOURCE_DIR="${{ steps.target.outputs.source_dir }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          COMMIT_DATE=$(git log -1 --format="%cd" --date=format:"%Y-%m-%d %H:%M")
          REPO_URL="https://github.com/${{ github.repository }}"
          VERFILE="${SOURCE_DIR}includes/infoAppVer.php"
          if [[ -f "$VERFILE" ]]; then
            sed -i "s|\[\"Commit\"\]\[\"SHA\"\]\[\"Full\"\] = NULL|\[\"Commit\"\]\[\"SHA\"\]\[\"Full\"\] = \"${COMMIT_SHA}\"|" "$VERFILE"
            sed -i "s|\[\"Commit\"\]\[\"SHA\"\]\[\"Short\"\] = NULL|\[\"Commit\"\]\[\"SHA\"\]\[\"Short\"\] = \"${SHORT_SHA}\"|" "$VERFILE"
            sed -i "s|\[\"Commit\"\]\[\"Date\"\] = NULL|\[\"Commit\"\]\[\"Date\"\] = \"${COMMIT_DATE}\"|" "$VERFILE"
            sed -i "s|\[\"Commit\"\]\[\"URL\"\] = NULL|\[\"Commit\"\]\[\"URL\"\] = \"${REPO_URL}/commit/${COMMIT_SHA}\"|" "$VERFILE"
            echo "Injected build info into infoAppVer.php - ${SHORT_SHA} @ ${COMMIT_DATE}"
          fi

      # -- Sync manifest.json name/description from infoAppVer.php --
      - name: Sync manifest.json from infoAppVer.php
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          SOURCE_DIR="${{ steps.target.outputs.source_dir }}"
          VERFILE="${SOURCE_DIR}includes/infoAppVer.php"
          MANIFEST="${SOURCE_DIR}manifest.json"
          if [[ -f "$VERFILE" && -f "$MANIFEST" ]]; then
            APP_NAME=$(grep -oP '\["Name"\] = "\K[^"]+' "$VERFILE" | head -1)
            APP_DESC=$(grep -oP '\["Synopsis"\] = "\K[^"]+' "$VERFILE")
            if [[ -n "$APP_NAME" ]]; then
              sed -i "s|\"name\": \"[^\"]*\"|\"name\": \"${APP_NAME}\"|" "$MANIFEST"
              sed -i "s|\"short_name\": \"[^\"]*\"|\"short_name\": \"${APP_NAME}\"|" "$MANIFEST"
              echo "Manifest name set to: ${APP_NAME}"
            fi
            if [[ -n "$APP_DESC" ]]; then
              sed -i "s|\"description\": \"[^\"]*\"|\"description\": \"${APP_DESC}\"|" "$MANIFEST"
              echo "Manifest description synced from infoAppVer.php"
            fi
          fi

      # -- Install lftp for SFTP mirroring --
      - name: Install lftp
        if: steps.changes.outputs.has_changes == 'true'
        run: sudo apt-get install -y lftp

      # -- Resolve SFTP port (default to 22 if empty, blank, or non-numeric) --
      - name: Resolve SFTP port
        if: steps.changes.outputs.has_changes == 'true'
        id: port
        env:
          RAW_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          # Strip whitespace from the raw port value
          TRIMMED_PORT=$(echo "$RAW_PORT" | tr -d '[:space:]')

          # Check if the trimmed value is a valid numeric port (1-65535)
          if [[ "$TRIMMED_PORT" =~ ^[0-9]+$ ]] && [[ "$TRIMMED_PORT" -ge 1 ]] && [[ "$TRIMMED_PORT" -le 65535 ]]; then
            echo "port=$TRIMMED_PORT" >> $GITHUB_OUTPUT
            echo "Using SFTP port: $TRIMMED_PORT"
          else
            echo "port=22" >> $GITHUB_OUTPUT
            echo "SFTP_PORT is empty, blank, or non-numeric — defaulting to port 22"
          fi

      # -- Determine auth method (SSH key preferred, password fallback) --
      - name: Check auth method
        if: steps.changes.outputs.has_changes == 'true'
        id: auth
        run: |
          if [[ -n "${{ secrets.SFTP_KEY }}" ]]; then
            echo "method=key" >> $GITHUB_OUTPUT
          else
            echo "method=password" >> $GITHUB_OUTPUT
          fi

      # -- Deploy via SFTP using SSH key authentication --
      - name: Deploy via SFTP (SSH key)
        if: steps.changes.outputs.has_changes == 'true' && steps.auth.outputs.method == 'key'
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ steps.port.outputs.port }}
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          SOURCE_DIR: ${{ steps.target.outputs.source_dir }}
          REMOTE_PATH: ${{ steps.target.outputs.remote_path }}
        run: |
          mkdir -p ~/.ssh
          echo "$SFTP_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > /tmp/lftp_script.txt <<LFTP_EOF
          set sftp:connect-program "ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/deploy_key -p ${SFTP_PORT}"
          open sftp://${SFTP_USER}@${SFTP_HOST}:${SFTP_PORT}
          mirror --reverse --delete --verbose --only-newer --no-empty-dirs --exclude .DS_Store --exclude .gitkeep --exclude .gitignore --exclude README.md --exclude CHANGELOG.md --exclude DEV_NOTES.md --exclude .htpasswd --exclude '.htpasswd-*' --exclude '.htpasswd.example' ${SOURCE_DIR} ${REMOTE_PATH}
          bye
          LFTP_EOF
          lftp -f /tmp/lftp_script.txt

      # -- Deploy via SFTP using password authentication (fallback) --
      - name: Deploy via SFTP (password)
        if: steps.changes.outputs.has_changes == 'true' && steps.auth.outputs.method == 'password'
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ steps.port.outputs.port }}
          SOURCE_DIR: ${{ steps.target.outputs.source_dir }}
          REMOTE_PATH: ${{ steps.target.outputs.remote_path }}
        run: |
          lftp -u "${SFTP_USER},${SFTP_PASS}" \
            -e "set sftp:auto-confirm yes; set ssl:verify-certificate no; \
            mirror --reverse --delete --verbose --only-newer --no-empty-dirs \
            --exclude .DS_Store --exclude .gitkeep --exclude .gitignore \
            --exclude README.md --exclude CHANGELOG.md --exclude DEV_NOTES.md \
            ${SOURCE_DIR} ${REMOTE_PATH}; bye" \
            "sftp://${SFTP_HOST}:${SFTP_PORT}"

      # ================================================================
      # PRIVATE_HTML DEPLOYMENT
      # Uploads appWeb/private_html/ to its own SFTP directory.
      # Runs alongside the public deployment when private files changed.
      # ================================================================

      # -- Check if private_html/ files changed --
      - name: Check private_html changes
        id: private_changes
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          if echo "$COMMIT_MSG" | grep -q "\[deploy all\]"; then
            echo "has_private_changes=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~5 HEAD -- "appWeb/private_html/" 2>/dev/null \
              | grep -vE '\.DS_Store|\.gitkeep|\.gitignore|\.htpasswd' | sort -u || true)
            if [[ -z "$CHANGED" ]]; then
              echo "has_private_changes=false" >> $GITHUB_OUTPUT
            else
              echo "has_private_changes=true" >> $GITHUB_OUTPUT
              echo "Private files changed:"
              echo "$CHANGED"
            fi
          fi

      # -- Deploy private_html/ via SFTP (SSH key) --
      - name: Deploy private_html via SFTP (SSH key)
        if: >-
          steps.private_changes.outputs.has_private_changes == 'true'
          && steps.auth.outputs.method == 'key'
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ steps.port.outputs.port }}
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          REMOTE_PATH: ${{ secrets.SFTP_PRIVATE_PATH }}
        run: |
          # Skip if SFTP_PRIVATE_PATH is not configured
          if [[ -z "$REMOTE_PATH" ]]; then
            echo "SFTP_PRIVATE_PATH not set — skipping private_html deployment"
            exit 0
          fi
          cat > /tmp/lftp_private.txt <<LFTP_EOF
          set sftp:connect-program "ssh -o StrictHostKeyChecking=no -i $HOME/.ssh/deploy_key -p ${SFTP_PORT}"
          open sftp://${SFTP_USER}@${SFTP_HOST}:${SFTP_PORT}
          mirror --reverse --delete --verbose --only-newer --no-empty-dirs --exclude .DS_Store --exclude .gitkeep --exclude .gitignore --exclude .htpasswd --exclude '.htpasswd-*' --exclude '.htpasswd.example' appWeb/private_html/ ${REMOTE_PATH}
          bye
          LFTP_EOF
          lftp -f /tmp/lftp_private.txt
          echo "Private HTML deployed to ${REMOTE_PATH}"

      # -- Deploy private_html/ via SFTP (password) --
      - name: Deploy private_html via SFTP (password)
        if: >-
          steps.private_changes.outputs.has_private_changes == 'true'
          && steps.auth.outputs.method == 'password'
        env:
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ steps.port.outputs.port }}
          REMOTE_PATH: ${{ secrets.SFTP_PRIVATE_PATH }}
        run: |
          # Skip if SFTP_PRIVATE_PATH is not configured
          if [[ -z "$REMOTE_PATH" ]]; then
            echo "SFTP_PRIVATE_PATH not set — skipping private_html deployment"
            exit 0
          fi
          lftp -u "${SFTP_USER},${SFTP_PASS}" \
            -e "set sftp:auto-confirm yes; set ssl:verify-certificate no; \
            mirror --reverse --delete --verbose --only-newer --no-empty-dirs \
            --exclude .DS_Store --exclude .gitkeep --exclude .gitignore \
            --exclude .htpasswd --exclude '.htpasswd-*' --exclude '.htpasswd.example' \
            appWeb/private_html/ ${REMOTE_PATH}; bye" \
            "sftp://${SFTP_HOST}:${SFTP_PORT}"
          echo "Private HTML deployed to ${REMOTE_PATH}"

      # ================================================================
      # DEPLOYMENT SUMMARY
      # ================================================================

      # -- Deployment summary in GitHub Actions UI --
      - name: Deployment summary
        if: steps.changes.outputs.has_changes == 'true' || steps.private_changes.outputs.has_private_changes == 'true'
        run: |
          echo "### ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.has_changes }}" == "true" ]]; then
            echo "- **Public:** ${{ steps.target.outputs.source_dir }} → ${{ steps.target.outputs.channel }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ steps.private_changes.outputs.has_private_changes }}" == "true" ]]; then
            echo "- **Private:** appWeb/private_html/ → private server path" >> $GITHUB_STEP_SUMMARY
          fi

      # -- No-deploy summary --
      - name: Skip summary
        if: steps.changes.outputs.has_changes == 'false' && steps.private_changes.outputs.has_private_changes == 'false'
        run: |
          echo "### ⏭️ No deployment needed" >> $GITHUB_STEP_SUMMARY
          echo "No deployable files changed." >> $GITHUB_STEP_SUMMARY
